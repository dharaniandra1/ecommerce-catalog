<!DOCTYPE html>
<html>
<head>
    <title>Order Success</title>
    <style>
        body {
            text-align: center;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            font-family: Arial;
            color: white;
            overflow: hidden;
        }

        h1 {
            font-size: 50px;
            margin-top: 100px;
            animation: pop 1s ease-in-out;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .btn {
            padding: 12px 25px;
            background: white;
            color: #0072ff;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 30px;
        }

        .btn:hover {
            background: yellow;
            color: black;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

<canvas id="confetti"></canvas>


<h2>🎉 Order Placed Successfully!</h2>
<p>Your Order ID: {{ order_id }}</p>

<br>

<a href="/track">
    <button>Track Order</button>
</a>

<br><br>

<a href="/">
    <button>Continue Shopping</button>
</a>

</script>

</body>
</html>
