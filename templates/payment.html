<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>
</head>
<body style="text-align:center; padding:50px;">

<h2>Payment Page 💳</h2>

<p>Total Amount: ₹{{ total }}</p>

<form action="/place_order" method="get">
    <input type="text" placeholder="Card Number" required><br><br>
    <input type="text" placeholder="Expiry Date" required><br><br>
    <input type="text" placeholder="CVV" required><br><br>

    <button type="submit" style="padding:10px; background:blue; color:white;">
        Pay Now
    </button>
</form>

</body>
</html>
